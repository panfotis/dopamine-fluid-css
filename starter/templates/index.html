<!--
  Dopamine Fluid — Starter Template
  ==================================

  1. Add your HTML files to this folder (or change "input" in dopamine.config.json)
  2. Use Dopamine class names in your markup
  3. Run `npm run build` for a one-time build
  4. Run `npm run dev` for watch + live reload
  5. Or run the direct `npx dopamine` and `npx sass` commands

  To change the scan path or file extensions, edit dopamine.config.json:

    {
      "input": "./your-path",
      "ext": "html,twig",
      "out": "./scss/_dopamine.scss"
    }

  Class reference → README.md
-->

<html lang="en">

</head>

  <div class="container-1200 px-16-48">

    <div class="grid cols-1 cols-md-2 cols-lg-4 gap-16-32">
      <div class="p-12-32 radius-4-12">Card 1</div>
      <div class="p-12-32 radius-4-12">Card 2</div>
      <div class="p-12-32 radius-4-12">Card 3</div>
      <div class="p-12-32 radius-4-12">Card 4</div>
    </div>

</body>
</html>
